<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Preorder Saree</title>

    <style>

    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background: #f4f6f9;
        padding: 25px;
    }

    .container{
        width: 45%;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.08);
    }

    h1{
        color: #6f42c1;
        margin-bottom: 22px;
        text-align: center;
        font-size: 26px;
    }

    .form-group{
        margin-bottom: 14px;
    }

    label{
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #444;
        font-size: 14px;
    }

    input,
    select{
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
        outline: none;
    }

    input:focus,
    select:focus{
        border-color: #6f42c1;
        box-shadow: 0 0 4px rgba(111,66,193,0.3);
    }

    .row{
        display: flex;
        gap: 15px;
    }

    .row .form-group{
        flex: 1;
    }

    button{
        width: 100%;
        padding: 12px;
        background: #6f42c1;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover{
        background: #5a32a3;
    }

    .back-link{
        display: inline-block;
        margin-bottom: 15px;
        text-decoration: none;
        color: #6f42c1;
        font-weight: bold;
        font-size: 14px;
    }

</style>

</head>

<body>

<div class="container">

    <a href="/admin_dashboard/" class="back-link">
        ← Back to Dashboard
    </a>

    <h1>Saree Preorder</h1>

    <form method="POST" action="/preorderaction/">

        {% csrf_token %}

        <div class="row">

            <div class="form-group">

                <label>Customer Name</label>

                <input type="text" name="name" required>

            </div>

            <div class="form-group">

                <label>Phone</label>

                <input type="text" name="phone" required>

            </div>

        </div>

        <div class="row">

            <div class="form-group">

                <label>Email</label>

                <input type="email" name="email" required>

            </div>

            <div class="form-group">

                <label>Address</label>

                <input type="text" name="address" required>

            </div>

        </div>

        <div class="row">

            <div class="form-group">

                <label>Saree Name</label>

                <input type="text" name="saree" required>

            </div>

            <div class="form-group">

                <label>Color</label>

                <input type="text" name="color" required>

            </div>

        </div>

        <div class="row">

            <div class="form-group">

                <label>Quantity</label>

                <input type="number" name="quantity" required>

            </div>

            <div class="form-group">

                <label>Delivery Date</label>

                <input type="date" name="delivery_date" required>

            </div>

        </div>

        <div class="form-group">

            <label>Priority</label>

            <select name="priority">

                <option value="High">High</option>

                <option value="Medium" selected>Medium</option>

                <option value="Low">Low</option>

            </select>

        </div>

        <button type="submit">

            Place Order

        </button>

    </form>

</div>

</body>

</html>
