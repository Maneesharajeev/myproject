<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preorder Saree</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        .card-header{
            background:#6f42c1;
            color:white;
            border-radius:15px 15px 0 0 !important;
            text-align:center;
        }

        .btn-purple{
            background:#6f42c1;
            color:white;
        }

        .btn-purple:hover{
            background:#5a32a3;
            color:white;
        }

        .back-link{
            text-decoration:none;
            font-weight:bold;
            color:#6f42c1;
        }

        .back-link:hover{
            color:#5a32a3;
        }

        label{
            font-weight:600;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8 col-md-10">

            <a href="/admin_dashboard/" class="back-link">
                ← Back to Dashboard
            </a>

            <div class="card mt-3">

                <div class="card-header">
                    <h2 class="mb-0">Saree Preorder</h2>
                </div>

                <div class="card-body p-4">

                    <form method="POST" action="/preorderaction/">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Customer Name</label>
                                <input type="text" class="form-control" name="name" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone</label>
                                <input type="text" class="form-control" name="phone" required>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" name="email" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Address</label>
                                <input type="text" class="form-control" name="address" required>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Saree Name</label>
                                <input type="text" class="form-control" name="saree" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Color</label>
                                <input type="text" class="form-control" name="color" required>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Quantity</label>
                                <input type="number" class="form-control" name="quantity" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Delivery Date</label>
                                <input type="date" class="form-control" name="delivery_date" required>
                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">Priority</label>

                            <select class="form-select" name="priority">

                                <option value="High">High</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="Low">Low</option>

                            </select>

                        </div>

                        <div class="d-grid">

                            <button type="submit" class="btn btn-purple btn-lg">
                                Place Order
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
