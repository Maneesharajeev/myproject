<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Worker Details</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f4f6f9;
            padding: 30px;
        }

        .container{
            width: 95%;
            margin: auto;
        }

        /* HEADER */

        .header{
            background: #6f42c1;
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1{
            font-size: 28px;
        }

        .back-btn{
            background: white;
            color: #6f42c1;
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn:hover{
            background: #ece3ff;
        }

        /* TABLE CARD */

        .table-card{
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.08);
            overflow-x: auto;
        }

        .table-card h2{
            color: #6f42c1;
            margin-bottom: 20px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table th{
            background: #6f42c1;
            color: white;
            padding: 14px;
            text-align: left;
        }

        table td{
            padding: 14px;
            border-bottom: 1px solid #ddd;
        }

        table tr:nth-child(even){
            background: #f8f8f8;
        }

        table tr:hover{
            background: #f1ebff;
        }

        .work-type{
            font-weight: bold;
            color: #6f42c1;
            text-transform: capitalize;
        }

        .salary{
            color: green;
            font-weight: bold;
        }

        .empty-box{
            text-align: center;
            padding: 30px;
            color: gray;
            font-size: 18px;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <h1>Admin Dashboard</h1>

        <a href="/admin_dashboard/" class="back-btn">
            Back
        </a>

    </div>

    <!-- TABLE SECTION -->

    <div class="table-card">

        <h2>Worker Details</h2>

        {% if data %}

        <table>

            <tr>

                <th>Worker Name</th>
                <th>Phone Number</th>
                <th>Address</th>
                <th>Work Type</th>
                <th>Personal ID</th>
                <th>Salary</th>

            </tr>

            {% for i in data %}

            <tr>

                <td>{{ i.name }}</td>

                <td>{{ i.phone }}</td>

                <td>{{ i.address }}</td>

                <td>

                    <span class="work-type">
                        {{ i.work_type }}
                    </span>

                </td>

                <td>{{ i.personal_id }}</td>

                <td>

                    <span class="salary">
                        ₹ {{ i.salary }}
                    </span>

                </td>

            </tr>

            {% endfor %}

        </table>

        {% else %}

        <div class="empty-box">

            No Workers Found

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
