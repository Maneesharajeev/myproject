<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Worker Details</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* Header */

        .header{
            background:#6f42c1;
            color:white;
            border-radius:12px;
            padding:25px;
        }

        .header h1{
            margin:0;
            font-size:30px;
            font-weight:bold;
        }

        .back-btn{
            background:white;
            color:#6f42c1;
            font-weight:bold;
        }

        .back-btn:hover{
            background:#ece3ff;
            color:#6f42c1;
        }

        /* Card */

        .table-card{
            background:white;
            border-radius:12px;
            padding:25px;
            box-shadow:0 0 12px rgba(0,0,0,.08);
        }

        .table-card h2{
            color:#6f42c1;
            font-weight:bold;
            margin-bottom:20px;
        }

        /* Table */

        .table thead th{
            background:#6f42c1;
            color:white;
            vertical-align:middle;
        }

        .table tbody tr:hover{
            background:#f1ebff;
        }

        /* Custom Styles */

        .work-type{
            color:#6f42c1;
            font-weight:bold;
            text-transform:capitalize;
        }

        .salary{
            color:#198754;
            font-weight:bold;
        }

        .empty-box{
            text-align:center;
            padding:40px;
            color:gray;
            font-size:18px;
        }

        @media (max-width:768px){

            .header h1{
                font-size:24px;
                text-align:center;
            }

            .table-card{
                padding:20px;
            }

            .table-card h2{
                font-size:24px;
            }

        }

    </style>

</head>

<body>

<div class="container py-4">

    <!-- Header -->

    <div class="header mb-4">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">

            <h1 class="mb-3 mb-md-0">
                Admin Dashboard
            </h1>

            <a href="/admin_dashboard/" class="btn back-btn">
                Back
            </a>

        </div>

    </div>

    <!-- Worker Details -->

    <div class="table-card">

        <h2>Worker Details</h2>

        {% if data %}

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>

                    <tr>

                        <th>Worker Name</th>
                        <th>Phone Number</th>
                        <th>Address</th>
                        <th>Work Type</th>
                        <th>Personal ID</th>
                        <th>Salary</th>

                    </tr>

                </thead>

                <tbody>

                {% for i in data %}

                    <tr>

                        <td>{{ i.name }}</td>

                        <td>{{ i.phone }}</td>

                        <td>{{ i.address }}</td>

                        <td>

                            <span class="work-type">

                                {{ i.work_type }}

                            </span>

                        </td>

                        <td>{{ i.personal_id }}</td>

                        <td>

                            <span class="salary">

                                ₹ {{ i.salary }}

                            </span>

                        </td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

        {% else %}

        <div class="empty-box">

            No Workers Found

        </div>

        {% endif %}

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
