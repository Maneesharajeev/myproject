<!-- Worker Details -->

<div class="table-card">

    <h2>Worker Details</h2>

    {% if data %}

    <div class="table-responsive">

        <table class="table table-hover align-middle">

            <thead>
                <tr>
                    <th>Worker Name</th>
                    <th>Phone Number</th>
                    <th>Address</th>
                    <th>Work Type</th>
                    <th>Personal ID</th>
                    <th>Salary</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

                {% for i in data %}

                <tr>

                    <td>{{ i.name }}</td>

                    <td>{{ i.phone }}</td>

                    <td>{{ i.address }}</td>

                    <td>
                        <span class="work-type">
                            {{ i.work_type }}
                        </span>
                    </td>

                    <td>{{ i.personal_id }}</td>

                    <td>
                        <span class="salary">
                            ₹ {{ i.salary }}
                        </span>
                    </td>

                    <td>

                        <a href="{% url 'editworker' i.id %}"
                           class="btn btn-warning btn-sm me-2">
                            Edit
                        </a>

                        <a href="{% url 'delete_worker' i.id %}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this worker?');">
                            Delete
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

    {% else %}

    <div class="empty-box">
        No Workers Found
    </div>

    {% endif %}

</div>
