<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Worker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .header{
            background:#6f42c1;
            color:white;
            border-radius:12px;
            padding:20px 25px;
            box-shadow:0 0 12px rgba(0,0,0,.08);
        }

        .header h1{
            margin:0;
            font-size:30px;
            font-weight:bold;
        }

        .back-btn{
            background:white;
            color:#6f42c1;
            font-weight:bold;
            border:none;
        }

        .back-btn:hover{
            background:#ece3ff;
            color:#6f42c1;
        }

        .form-card{
            background:white;
            border-radius:12px;
            padding:30px;
            box-shadow:0 0 12px rgba(0,0,0,.08);
        }

        .form-card h2{
            color:#6f42c1;
            font-weight:bold;
            text-align:center;
            margin-bottom:30px;
        }

        .form-label{
            font-weight:bold;
            color:#333;
        }

        .form-control,
        .form-select{
            padding:12px;
            border-radius:6px;
        }

        .form-control:focus,
        .form-select:focus{
            border-color:#6f42c1;
            box-shadow:0 0 0 .2rem rgba(111,66,193,.25);
        }

        .btn-update{
            background:#6f42c1;
            color:white;
            font-weight:bold;
            padding:12px;
        }

        .btn-update:hover{
            background:#5a32a3;
            color:white;
        }

    </style>

</head>

<body>

<div class="container py-4">

    <!-- Header -->

    <div class="header mb-4">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">

            <h1 class="mb-3 mb-md-0">
                Admin Dashboard
            </h1>

            <a href="/worker_details/" class="btn back-btn">
                Back
            </a>

        </div>

    </div>

    <!-- Edit Form -->

    <div class="row justify-content-center">

        <div class="col-12 col-md-8 col-lg-6">

            <div class="form-card">

                <h2>Edit Worker Details</h2>

                <form method="POST" action="/update_worker/{{ worker.id }}/">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">Worker Name</label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            value="{{ worker.name }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Phone Number</label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            value="{{ worker.phone }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Address</label>

                        <textarea
                            name="address"
                            class="form-control"
                            rows="4">{{ worker.address }}</textarea>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Work Type</label>

                        <select name="work_type" class="form-select" required>

                            <option value="cutwork/Embroidary"
                                {% if worker.work_type == 'cutwork/Embroidary' %}selected{% endif %}>
                                Cutwork / Embroidery
                            </option>

                            <option value="Handwork/Applique"
                                {% if worker.work_type == 'Handwork/Applique' %}selected{% endif %}>
                                Handwork / Applique
                            </option>

                            <option value="Readymade"
                                {% if worker.work_type == 'Readymade' %}selected{% endif %}>
                                Readymade
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Personal ID</label>

                        <input
                            type="text"
                            name="personal_id"
                            class="form-control"
                            value="{{ worker.personal_id }}"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">Salary</label>

                        <input
                            type="number"
                            name="salary"
                            class="form-control"
                            value="{{ worker.salary }}"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-update w-100">

                        Update Worker

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
