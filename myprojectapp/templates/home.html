<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(to right,#6f42c1,#9b6dff);
        }

        .login-container{
            background:white;
            border-radius:12px;
            box-shadow:0 0 20px rgba(0,0,0,.2);
            padding:40px;
        }

        .login-container h2{
            color:#6f42c1;
            font-size:32px;
            font-weight:bold;
            margin-bottom:30px;
        }

        label{
            font-weight:bold;
            color:#333;
            margin-bottom:8px;
        }

        .form-control{
            padding:12px;
            border-radius:6px;
        }

        .form-control:focus{
            border-color:#6f42c1;
            box-shadow:0 0 5px rgba(111,66,193,.4);
        }

        .btn-login{
            background:#6f42c1;
            color:white;
            padding:12px;
            font-size:16px;
            font-weight:bold;
        }

        .btn-login:hover{
            background:#5a32a3;
            color:white;
        }

        .error-message{
            color:red;
            text-align:center;
            margin-top:15px;
        }

        .footer-text{
            text-align:center;
            color:#666;
            margin-top:20px;
        }

        @media (max-width:576px){

            .login-container{
                padding:25px;
            }

            .login-container h2{
                font-size:26px;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">

            <div class="login-container">

                <h2 class="text-center">Fabroses</h2>

                <form method="POST" action="/loginaction/" autocomplete="off">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>

                        <input
                            type="text"
                            class="form-control"
                            name="x_user_784"
                            placeholder="Enter Username"
                            required
                            readonly
                            onfocus="this.removeAttribute('readonly');">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Personal ID</label>

                        <input
                            type="password"
                            class="form-control"
                            name="personal_id"
                            placeholder="Enter Personal ID"
                            required
                            autocomplete="off">
                    </div>

                    <button type="submit" class="btn btn-login w-100">
                        Login
                    </button>

                </form>

                {% if error %}
                <div class="error-message">
                    {{ error }}
                </div>
                {% endif %}

                <div class="footer-text">
                    Saree Preorder Management System
                </div>

            </div>

        </div>

    </div>

</div>

<script>
window.onload = function () {
    document.querySelector("form").reset();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
